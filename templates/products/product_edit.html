{% extends 'base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4 text-center">Edit Product</h1>
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <!-- Show Existing Product Image -->
                {% if form.instance.image %}
                <div class="text-center">
                    <img src="{{ form.instance.image.url }}" class="img-fluid rounded mb-3" style="max-width: 100%;" alt="Product Image">
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100">Update Product</button>
                <a href="{% url 'product_list' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
