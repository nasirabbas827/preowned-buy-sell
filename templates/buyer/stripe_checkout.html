{% extends 'base.html' %}
{% block title %}Stripe Payment{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    <h2>Complete Your Payment</h2>
    <p>Order: {{ order.product.title }}</p>
    <p>Amount: ${{ order.product.price }}</p>

    <form id="payment-form">
        <div id="card-element"></div>
        <button id="submit" class="btn btn-primary mt-3">Pay Now</button>
    </form>

    <p id="payment-status"></p>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    var stripe = Stripe("{{ stripe_public_key }}");
    var elements = stripe.elements();
    var card = elements.create("card");
    card.mount("#card-element");

    document.getElementById("payment-form").addEventListener("submit", function(event) {
        event.preventDefault();
        stripe.confirmCardPayment("{{ client_secret }}", {
            payment_method: { card: card }
        }).then(function(result) {
            if (result.error) {
                document.getElementById("payment-status").innerText = "Payment failed. Try again.";
            } else {
                window.location.href = "{% url 'payment_success' order.order_id %}";
            }
        });
    });
</script>
{% endblock %}
